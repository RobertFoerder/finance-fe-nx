@if (store.editing()) {
  <span>Editing...</span>
}
@if (!store.loaded()) {
  <span>Loading...</span>
}
@if (!fixedCost && store.loaded()) {
  <span>No fixed cost with this id</span>
}
@if (!store.editing() && fixedCost) {
  <form
    #fixedCostForm="ngForm"
    class="max-w-md"
    (ngSubmit)="saveFixedCost()"
    >
    <div>
      <label for="category">Category*</label>
      <input
        name="category"
        type="text"
        [(ngModel)]="fixedCost.category"
        required
        />
    </div>
    <div>
      <label for="description">Description*</label>
      <input
        name="description"
        type="text"
        [(ngModel)]="fixedCost.description"
        required
        />
    </div>
    <div>
      <label for="value">Value*</label>
      <finance-fe-value-input
        [income]="initialValue >= 0"
        name="value"
        [(ngModel)]="fixedCost.value"
        required
      ></finance-fe-value-input>
    </div>
    <div>
      <button
        [disabled]="fixedCostForm.form.untouched || !fixedCostForm.form.valid"
        type="submit"
        class="btn-primary mt-2"
        >
        Save
      </button>
    </div>
  </form>
}
