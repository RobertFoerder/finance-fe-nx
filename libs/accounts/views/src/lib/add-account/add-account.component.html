@if (store.adding()) {
  <span>Adding...</span>
}
@if (!store.adding()) {
  <form
    (ngSubmit)="store.addAccount(account)"
    #accountForm="ngForm"
    class="max-w-md"
    >
    <div>
      <label for="name">Name*</label>
      <input name="name" type="text" [(ngModel)]="account.name" required />
    </div>
    <div>
      <label for="value">Value*</label>
      <finance-fe-value-input
        [income]="true"
        [(ngModel)]="account.value"
        required
        name="value"
      ></finance-fe-value-input>
    </div>
    <div>
      <button
        [disabled]="accountForm.form.untouched || !accountForm.form.valid"
        type="submit"
        class="btn-primary mt-2"
        >
        Add account
      </button>
    </div>
  </form>
}
